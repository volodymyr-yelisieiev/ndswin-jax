trials: 24
method: random
metric: val_accuracy
budget_epochs: 50
max_steps_per_epoch: 400
trial_timeout_seconds: 5400
output_dir: outputs/sweeps/cifar100_tuned_hyperparam_sweep
base_config: configs/cifar100_tuned.json
seed: 100

param_space:
  training.learning_rate:
    kind: log_uniform
    min: 1e-4
    max: 1.2e-3
  training.batch_size:
    kind: choice
    values: [128]
  model.drop_rate:
    kind: choice
    values: [0.0, 0.05, 0.1]
  model.drop_path_rate:
    kind: choice
    values: [0.1, 0.2, 0.3, 0.4]
  training.weight_decay:
    kind: log_uniform
    min: 0.01
    max: 0.1
  training.label_smoothing:
    kind: choice
    values: [0.0, 0.05, 0.1, 0.15]
  training.warmup_epochs:
    kind: choice
    values: [10, 20, 30]
  data.mixup_alpha:
    kind: choice
    values: [0.0, 0.2, 0.4, 0.8]
  data.cutmix_alpha:
    kind: choice
    values: [0.0, 0.5, 1.0]
  data.cutout_size:
    kind: choice
    values: [0, 8, 12, 16]
  data.color_jitter:
    kind: choice
    values: [false, true]
