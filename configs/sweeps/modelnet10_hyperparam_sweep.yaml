trials: 15
metric: val_accuracy
budget_epochs: 10
max_steps_per_epoch: 100
output_dir: outputs/sweeps/modelnet10_hyperparam_sweep
base_config: configs/modelnet10.json

param_space:
  training.learning_rate:
    kind: log_uniform
    min: 1e-5
    max: 2e-3
  training.batch_size:
    kind: choice
    values: [16, 32, 64]
  model.embed_dim:
    kind: choice
    values: [24, 48, 72, 96]
  model.drop_rate:
    kind: choice
    values: [0.0, 0.1, 0.2]
  model.drop_path_rate:
    kind: choice
    values: [0.0, 0.1, 0.2]
  training.weight_decay:
    kind: log_uniform
    min: 0.001
    max: 0.05
  training.label_smoothing:
    kind: choice
    values: [0.0, 0.1]
  training.warmup_epochs:
    kind: choice
    values: [5, 10, 20]
