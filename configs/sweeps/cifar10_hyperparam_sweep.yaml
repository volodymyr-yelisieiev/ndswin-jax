trials: 20
trialsmethod: random
metric: val_accuracy
budget_epochs: 30
max_steps_per_epoch: 220
output_dir: outputs/sweeps/cifar10_hyperparam_sweep
base_config: configs/cifar10.json

param_space:
  training.learning_rate:
    kind: log_uniform
    min: 3e-4
    max: 2e-3
  training.batch_size:
    kind: choice
    values: [128, 256]
  model.embed_dim:
    kind: choice
    values: [96, 128]
  model.drop_rate:
    kind: choice
    values: [0.0, 0.05]
  model.drop_path_rate:
    kind: choice
    values: [0.05, 0.1, 0.2]
  training.weight_decay:
    kind: log_uniform
    min: 0.005
    max: 0.05
  training.label_smoothing:
    kind: choice
    values: [0.0, 0.05, 0.1]
  training.warmup_epochs:
    kind: choice
    values: [5, 10, 20]
  data.mixup_alpha:
    kind: choice
    values: [0.0, 0.2, 0.4]
  data.cutmix_alpha:
    kind: choice
    values: [0.0, 0.5, 1.0]
  data.cutout_size:
    kind: choice
    values: [0, 8, 12]
